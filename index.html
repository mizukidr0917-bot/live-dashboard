<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE LOG Dashboard v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface-alt: #f8fafc;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --text-primary: #1a202c;
    --text-secondary: #64748b;
    --text-tertiary: #94a3b8;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --green: #059669;
    --green-light: #d1fae5;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --purple: #7c3aed;
    --purple-light: #ede9fe;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.09), 0 4px 8px rgba(0,0,0,0.05);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    overflow-x: hidden;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 40;
  }

  .topbar-brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topbar-brand::before {
    content: '♪';
    font-size: 16px;
  }

  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 16px 48px;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: 0.04em;
    color: var(--text-primary);
    line-height: 1;
  }

  .header-title span {
    color: var(--accent);
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 12px;
  }

  .condition-bar {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .condition-bar strong {
    color: var(--text-primary);
    margin-right: 8px;
  }

  .quality-inline {
    margin-bottom: 16px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text-secondary);
  }

  .quality-inline.warn {
    background: var(--amber-light);
    color: #8a4b00;
    border-color: #f3d48b;
  }

  .quality-inline.good {
    color: var(--green);
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 10px;
  }

  .summary-subgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-light);
  }

  .summary-card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }

  .icon-blue { background: var(--accent-light); }
  .icon-green { background: var(--green-light); }
  .icon-amber { background: var(--amber-light); }

  .summary-card-value {
    font-family: 'Outfit', sans-serif;
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    color: var(--text-primary);
  }

  .summary-card-value span {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-left: 4px;
  }

  .summary-card-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: 6px;
    letter-spacing: 0.03em;
  }

  .summary-card-sub {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-light);
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .mini-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: var(--shadow-sm);
  }

  .mini-label {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .mini-value {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-top: 4px;
    color: var(--text-primary);
  }

  .mini-sub {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .section-title::before {
    content: '';
    width: 3px;
    height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  .section-note {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-tertiary);
    margin-left: 4px;
  }

  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-light);
    min-width: 0;
  }

  .chart-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
    overscroll-behavior-x: contain;
    overscroll-behavior-y: auto;
    width: 100%;
    padding-bottom: 2px;
  }

  .chart-scroll::-webkit-scrollbar {
    height: 6px;
  }

  .chart-scroll::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 999px;
  }

  .chart-inner-normal {
    width: 100%;
    min-width: 0;
  }

  .chart-inner-wide {
    width: 1200px;
    min-width: 1200px;
  }

  .chart-wrap {
    position: relative;
    height: 240px;
  }

  .analysis-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .ranking-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-light);
  }

  .ranking-item:last-child {
    border-bottom: none;
  }

  .ranking-num {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 700;
    width: 22px;
    text-align: center;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }

  .ranking-num.top1 { color: #c8960c; }
  .ranking-num.top2 { color: #9ca3af; }
  .ranking-num.top3 { color: #cd7c3a; }

  .ranking-bar-wrap {
    flex: 1;
    min-width: 0;
  }

  .ranking-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .ranking-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .ranking-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
  }

  .ranking-bar-fill.green { background: var(--green); }
  .ranking-bar-fill.purple { background: var(--purple); }

  .ranking-value {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    flex-shrink: 0;
    min-width: 72px;
    text-align: right;
  }

  .ranking-sub {
    display: block;
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  .scroll-list {
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .star5-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .star5-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--amber);
  }

  .star5-date {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }

  .star5-live-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.45;
    margin-bottom: 6px;
  }

  .star5-artist {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .star5-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 7px;
  }

  .star5-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
  }

  .star5-link:hover {
    text-decoration: underline;
  }

  .no-data-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    text-align: center;
  }

  .no-data-icon {
    font-size: 64px;
    opacity: 0.3;
  }

  .no-data-title {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-secondary);
  }

  .no-data-sub {
    font-size: 13px;
    color: var(--text-tertiary);
    max-width: 320px;
  }

  .hidden { display: none !important; }

  .empty-msg {
    text-align: center;
    padding: 32px;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text-primary);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .fab-filter {
    position: fixed;
    right: 16px;
    bottom: 18px;
    z-index: 80;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 58px;
    height: 58px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 10px 24px rgba(37,99,235,0.28);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }

  .fab-filter:hover {
    background: #1d4ed8;
  }

  .fab-filter span {
    display: block;
    font-size: 11px;
    line-height: 1;
  }

  .filter-drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 90;
  }

  .filter-drawer-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  .filter-drawer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--surface);
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    box-shadow: 0 -12px 30px rgba(0,0,0,0.12);
    transform: translateY(102%);
    transition: transform 0.24s ease;
    z-index: 100;
    max-height: 84vh;
    overflow-y: auto;
  }

  .filter-drawer.open {
    transform: translateY(0);
  }

  .drawer-header {
    padding: 14px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .drawer-title {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .drawer-close {
    border: none;
    background: transparent;
    font-size: 22px;
    line-height: 1;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .drawer-body {
    padding: 0 16px 18px;
    display: grid;
    gap: 14px;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
  }

  .search-combobox {
    position: relative;
  }

  .artist-search-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    font-size: 14px;
    color: var(--text-primary);
  }

  .artist-search-input:focus {
    outline: none;
    border-color: #93c5fd;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
  }

  .artist-options {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    max-height: 220px;
    overflow-y: auto;
    z-index: 120;
    display: none;
  }

  .artist-options.open {
    display: block;
  }

  .artist-option {
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-light);
  }

  .artist-option:last-child {
    border-bottom: none;
  }

  .artist-option.active,
  .artist-option:hover {
    background: var(--accent-light);
    color: var(--accent);
  }

  .artist-current {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .filter-btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .filter-btn {
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 999px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 1px 4px rgba(37,99,235,0.35);
  }

  @media (max-width: 980px) {
    .charts-row, .analysis-row {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 700px) {
    .main {
      padding: 16px 12px 36px;
    }

    .header-title {
      font-size: 28px;
    }

    .summary-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .summary-grid .card {
      padding: 12px 10px;
    }

    .summary-card-icon {
      width: 30px;
      height: 30px;
      font-size: 15px;
      margin-bottom: 8px;
      border-radius: 8px;
    }

    .summary-card-value {
      font-size: 24px;
    }

    .summary-card-value span {
      font-size: 12px;
      margin-left: 2px;
    }

    .summary-card-label {
      font-size: 10px;
      line-height: 1.25;
      margin-top: 5px;
    }

    .summary-card-sub {
      font-size: 9px;
      line-height: 1.3;
      margin-top: 8px;
      padding-top: 8px;
    }

    .summary-subgrid {
      grid-template-columns: 1fr;
    }

    .chart-wrap {
      height: 220px;
    }

    .chart-inner-wide {
      width: 900px;
      min-width: 900px;
    }

    .star5-grid {
      grid-template-columns: 1fr;
    }

    .scroll-list {
      max-height: none;
      overflow: visible;
      padding-right: 0;
    }

    .ranking-name {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      line-height: 1.35;
    }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">LIVE LOG</div>
  </div>

  <div class="main">
    <div class="no-data-screen" id="no-data-screen">
      <div class="no-data-icon">🎵</div>
      <div class="no-data-title">ライブログへようこそ</div>
      <div class="no-data-sub">Notionのライブ記録を読み込んで表示します</div>
    </div>

    <div id="dashboard" class="hidden">
      <div class="header">
        <div class="header-left">
          <div class="header-title">LIVE <span>LOG</span></div>
          <div class="header-subtitle">
            <span id="header-period">対象期間：読み込み中</span>
            <span class="header-badge" id="header-total">0 件</span>
          </div>
        </div>
      </div>

      <div class="condition-bar" id="condition-bar">
        <strong>表示条件</strong><span id="condition-text">全体</span>
      </div>

      <div id="quality-inline" class="quality-inline">データ品質を確認中…</div>

      <div class="summary-grid">
        <div class="card summary-card">
          <div class="summary-card-icon icon-blue">🎤</div>
          <div class="summary-card-value" id="sc-total">—<span>回</span></div>
          <div class="summary-card-label">ライブ回数</div>
          <div class="summary-card-sub" id="sc-total-sub">—</div>
        </div>
        <div class="card summary-card">
          <div class="summary-card-icon icon-green">⭐</div>
          <div class="summary-card-value" id="sc-avg">—</div>
          <div class="summary-card-label">平均評価</div>
          <div class="summary-card-sub" id="sc-avg-sub">—</div>
        </div>
        <div class="card summary-card">
          <div class="summary-card-icon icon-amber">✨</div>
          <div class="summary-card-value" id="sc-star5">—<span>回</span></div>
          <div class="summary-card-label">星5ライブ数</div>
          <div class="summary-card-sub" id="sc-star5-sub">—</div>
        </div>
      </div>

      <div class="summary-subgrid">
        <div class="mini-card">
          <div class="mini-label">前月比</div>
          <div class="mini-value" id="mini-mom">—</div>
          <div class="mini-sub" id="mini-mom-sub">—</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">前年・前期間比</div>
          <div class="mini-value" id="mini-yoy">—</div>
          <div class="mini-sub" id="mini-yoy-sub">—</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">全体に占める割合</div>
          <div class="mini-value" id="mini-share">—</div>
          <div class="mini-sub" id="mini-share-sub">—</div>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <div class="section-title">月別ライブ回数<span class="section-note">※形式別内訳</span></div>
          <div class="chart-scroll" id="bar-chart-scroll">
            <div id="bar-chart-inner" class="chart-inner-normal">
              <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
            </div>
          </div>
        </div>
        <div class="chart-card">
          <div class="section-title">月別平均評価</div>
          <div class="chart-scroll" id="line-chart-scroll">
            <div id="line-chart-inner" class="chart-inner-normal">
              <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <div class="analysis-row">
        <div class="card">
          <div class="section-title" id="left-panel-title">アーティスト別回数</div>
          <div class="scroll-list" id="left-panel-list"></div>
        </div>
        <div class="card">
          <div class="section-title">アーティスト別平均評価<span class="section-note">※ワンマンのみ・3回以上</span></div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:10px;">平均評価はワンマンのみ集計</div>
          <div class="scroll-list" id="artist-rating-ranking"></div>
        </div>
        <div class="card">
          <div class="section-title">会場ランキング</div>
          <div class="scroll-list" id="venue-ranking"></div>
        </div>
      </div>

      <div>
        <div class="section-title" style="margin-bottom:16px;">⭐⭐⭐⭐⭐ 星5ライブ一覧</div>
        <div id="star5-list" class="star5-grid"></div>
      </div>
    </div>
  </div>

  <button class="fab-filter" id="fab-filter" aria-label="フィルター">
    <span>絞込</span>
  </button>

  <div class="filter-drawer-backdrop" id="drawer-backdrop"></div>
  <div class="filter-drawer" id="filter-drawer" aria-hidden="true">
    <div class="drawer-header">
      <div class="drawer-title">フィルター</div>
      <button class="drawer-close" id="drawer-close" aria-label="閉じる">×</button>
    </div>
    <div class="drawer-body">
      <div class="filter-group">
        <span class="filter-label">アーティスト</span>
        <div class="search-combobox">
          <input type="text" id="artist-search-input" class="artist-search-input" placeholder="アーティスト名で検索">
          <div class="artist-options" id="artist-options"></div>
        </div>
        <div class="artist-current" id="artist-current-label">現在：全アーティスト</div>
      </div>

      <div class="filter-group">
        <span class="filter-label">期間</span>
        <div class="filter-btn-group" id="period-filter">
          <button class="filter-btn active" data-value="all">全期間</button>
          <button class="filter-btn" data-value="thisYear">今年</button>
          <button class="filter-btn" data-value="lastYear">昨年</button>
          <button class="filter-btn" data-value="last12">直近12か月</button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">形式</span>
        <div class="filter-btn-group" id="format-filter">
          <button class="filter-btn active" data-value="all">全形式</button>
          <button class="filter-btn" data-value="ワンマン">ワンマン</button>
          <button class="filter-btn" data-value="対バン">対バン</button>
          <button class="filter-btn" data-value="フェス">フェス</button>
          <button class="filter-btn" data-value="サーキット">サーキット</button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">評価</span>
        <div class="filter-btn-group" id="rating-filter">
          <button class="filter-btn active" data-value="all">全評価</button>
          <button class="filter-btn" data-value="star5">★5のみ</button>
          <button class="filter-btn" data-value="high">★4以上</button>
          <button class="filter-btn" data-value="low">★3以下</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
let allRecords = [];
let allArtists = [];
let barChart = null;
let lineChart = null;

let currentArtist = 'all';
let currentPeriod = 'all';
let currentFormat = 'all';
let currentRating = 'all';

function normalizeApiRecords(apiRecords) {
  return apiRecords
    .map((r) => {
      if (!r.date) return null;
      const date = new Date(r.date);
      if (Number.isNaN(date.getTime())) return null;
      const artists = Array.isArray(r.artists) ? r.artists.filter(Boolean) : [];
      return {
        liveName: r.liveName || '',
        artistRaw: artists.join(', '),
        artists,
        setlistUrl: r.setlistUrl || '',
        venue: r.venue || '',
        format: r.format || '',
        date,
        rating: Number(r.rating || 0),
        dateStr: r.date || ''
      };
    })
    .filter(Boolean);
}

async function loadFromApi() {
  try {
    const res = await fetch('/api/live-log');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'APIの取得に失敗しました');

    allRecords = normalizeApiRecords(data).sort((a, b) => a.date - b.date);
    allArtists = [...new Set(allRecords.flatMap(r => r.artists))].sort((a, b) => a.localeCompare(b, 'ja'));

    if (!allRecords.length) {
      showToast('Notionデータは取得できましたが、表示対象がありません');
      return;
    }

    renderArtistOptions('');
    updateArtistCurrentLabel();
    showDashboard();
    renderDashboard();
    showToast(`${allRecords.length} 件のNotionデータを読み込みました`);
  } catch (err) {
    console.error(err);
    showToast(`読み込み失敗: ${err.message}`);
  }
}

function getFilteredRecords() {
  const now = new Date();
  const thisYear = now.getFullYear();
  const lastYear = thisYear - 1;

  return allRecords.filter(r => {
    if (currentArtist !== 'all' && !r.artists.includes(currentArtist)) return false;

    if (currentPeriod === 'thisYear') {
      if (r.date.getFullYear() !== thisYear) return false;
    } else if (currentPeriod === 'lastYear') {
      if (r.date.getFullYear() !== lastYear) return false;
    } else if (currentPeriod === 'last12') {
      const cutoff = new Date(now.getFullYear(), now.getMonth() - 11, 1);
      if (r.date < cutoff) return false;
    }

    if (currentFormat !== 'all' && r.format !== currentFormat) return false;

    if (currentRating === 'star5' && r.rating !== 5) return false;
    if (currentRating === 'high' && r.rating < 4) return false;
    if (currentRating === 'low' && r.rating > 3) return false;

    return true;
  });
}

function getMonthRange(records) {
  const now = new Date();
  const months = [];

  if (currentPeriod === 'thisYear') {
    const y = now.getFullYear();
    for (let m = 0; m < 12; m++) months.push({ y, m });
    return months;
  }
  if (currentPeriod === 'lastYear') {
    const y = now.getFullYear() - 1;
    for (let m = 0; m < 12; m++) months.push({ y, m });
    return months;
  }
  if (currentPeriod === 'last12') {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ y: d.getFullYear(), m: d.getMonth() });
    }
    return months;
  }

  if (!records.length) return months;

  const sorted = [...records].sort((a, b) => a.date - b.date);
  let y = sorted[0].date.getFullYear();
  let m = sorted[0].date.getMonth();
  const endY = sorted[sorted.length - 1].date.getFullYear();
  const endM = sorted[sorted.length - 1].date.getMonth();

  while (y < endY || (y === endY && m <= endM)) {
    months.push({ y, m });
    m++;
    if (m > 11) {
      m = 0;
      y++;
    }
  }
  return months;
}

function buildMonthlyStats(records, months) {
  const formatKeys = ['ワンマン', '対バン', 'フェス', 'サーキット'];
  const monthMap = new Map();

  months.forEach(({ y, m }) => {
    const key = `${y}-${String(m + 1).padStart(2, '0')}`;
    monthMap.set(key, {
      count: 0,
      ratingTotal: 0,
      ratingCount: 0,
      star5Count: 0,
      formats: Object.fromEntries(formatKeys.map(f => [f, 0]))
    });
  });

  records.forEach(r => {
    const key = `${r.date.getFullYear()}-${String(r.date.getMonth() + 1).padStart(2, '0')}`;
    if (!monthMap.has(key)) return;
    const row = monthMap.get(key);
    row.count += 1;
    if (r.rating > 0) {
      row.ratingTotal += r.rating;
      row.ratingCount += 1;
    }
    if (r.rating === 5) row.star5Count += 1;
    if (row.formats[r.format] !== undefined) row.formats[r.format] += 1;
  });

  return months.map(({ y, m }) => {
    const key = `${y}-${String(m + 1).padStart(2, '0')}`;
    const row = monthMap.get(key);
    return {
      label: `${y}/${String(m + 1).padStart(2, '0')}`,
      count: row.count,
      avgRating: row.ratingCount ? +(row.ratingTotal / row.ratingCount).toFixed(2) : null,
      star5Count: row.star5Count,
      formats: row.formats
    };
  });
}

function getPeriodSummaryText(records) {
  const dates = records.map(r => r.date).sort((a, b) => a - b);
  if (!dates.length) return '対象期間：データなし';
  const s = dates[0];
  const e = dates[dates.length - 1];
  const fmt = d => `${d.getFullYear()}年${d.getMonth() + 1}月`;
  return `対象期間：${fmt(s)}〜${fmt(e)}`;
}

function formatDelta(diff, unit = '回') {
  if (unit === '') {
    const sign = diff > 0 ? '+' : '';
    return `${sign}${diff.toFixed(2)}`;
  }
  const sign = diff > 0 ? '+' : '';
  return `${sign}${diff}${unit}`;
}

function getConditionText() {
  const parts = [];
  parts.push(currentArtist === 'all' ? '全アーティスト' : currentArtist);

  const periodMap = {
    all: '全期間',
    thisYear: '今年',
    lastYear: '昨年',
    last12: '直近12か月'
  };
  parts.push(periodMap[currentPeriod]);

  if (currentFormat !== 'all') parts.push(currentFormat);

  const ratingMap = {
    star5: '★5のみ',
    high: '★4以上',
    low: '★3以下'
  };
  if (currentRating !== 'all') parts.push(ratingMap[currentRating]);

  return parts.join(' / ');
}

function getQualityMetrics() {
  const total = allRecords.length;
  const missingRating = allRecords.filter(r => !r.rating).length;
  const missingFormat = allRecords.filter(r => !r.format).length;
  const missingVenue = allRecords.filter(r => !r.venue).length;
  const uniqueKeyCount = new Set(allRecords.map(r => [r.liveName, r.dateStr, r.venue, r.format, r.artistRaw].join('|'))).size;
  const duplicateLike = Math.max(total - uniqueKeyCount, 0);
  return { total, missingRating, missingFormat, missingVenue, duplicateLike };
}

function renderQualityInline() {
  const q = getQualityMetrics();
  const issues = [];
  if (q.missingRating > 0) issues.push(`評価なし ${q.missingRating}件`);
  if (q.missingFormat > 0) issues.push(`形式なし ${q.missingFormat}件`);
  if (q.missingVenue > 0) issues.push(`会場なし ${q.missingVenue}件`);
  if (q.duplicateLike > 0) issues.push(`重複候補 ${q.duplicateLike}件`);

  const el = document.getElementById('quality-inline');

  if (!issues.length) {
    el.className = 'quality-inline good';
    el.textContent = `データ品質：問題なし（全${q.total}件）`;
  } else {
    el.className = 'quality-inline warn';
    el.textContent = `データ品質：${issues.join(' / ')}`;
  }
}

function getAllCurrentFilterBaseRecords() {
  return allRecords.filter(r => {
    if (currentArtist !== 'all' && !r.artists.includes(currentArtist)) return false;
    if (currentFormat !== 'all' && r.format !== currentFormat) return false;
    if (currentRating === 'star5' && r.rating !== 5) return false;
    if (currentRating === 'high' && r.rating < 4) return false;
    if (currentRating === 'low' && r.rating > 3) return false;
    return true;
  });
}

function renderHeader(records) {
  document.getElementById('header-period').textContent = getPeriodSummaryText(records);
  document.getElementById('header-total').textContent = `総ライブ数 ${records.length} 件`;
  document.getElementById('condition-text').textContent = getConditionText();
}

function renderSummary(records) {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const baseRecords = getAllCurrentFilterBaseRecords();
  const ratings = records.filter(r => r.rating > 0).map(r => r.rating);
  const avg = ratings.length ? (ratings.reduce((a, b) => a + b, 0) / ratings.length) : 0;
  const star5 = records.filter(r => r.rating === 5).length;

  document.getElementById('sc-total').innerHTML = `${records.length}<span>回</span>`;
  document.getElementById('sc-avg').textContent = avg.toFixed(2);
  document.getElementById('sc-star5').innerHTML = `${star5}<span>回</span>`;

  const monthRecords = baseRecords.filter(r => r.date.getFullYear() === thisYear && r.date.getMonth() === thisMonth);
  const prevMonthDate = new Date(thisYear, thisMonth - 1, 1);
  const prevMonthRecords = baseRecords.filter(r => r.date.getFullYear() === prevMonthDate.getFullYear() && r.date.getMonth() === prevMonthDate.getMonth());
  const momDiff = monthRecords.length - prevMonthRecords.length;

  const currentPeriodRecords = records;
  let previousPeriodRecords = [];
  let previousLabel = '前期間';

  if (currentPeriod === 'thisYear' || currentPeriod === 'lastYear') {
    const targetYear = currentPeriod === 'thisYear' ? now.getFullYear() : now.getFullYear() - 1;
    const prevYear = targetYear - 1;
    previousPeriodRecords = baseRecords.filter(r => r.date.getFullYear() === prevYear);
    previousLabel = `${prevYear}年`;
  } else if (currentPeriod === 'last12') {
    const currentMonths = getMonthRange(currentPeriodRecords);
    if (currentMonths.length) {
      const start = new Date(currentMonths[0].y, currentMonths[0].m, 1);
      const end = new Date(currentMonths[currentMonths.length - 1].y, currentMonths[currentMonths.length - 1].m + 1, 0);
      const prevStart = new Date(start.getFullYear(), start.getMonth() - 12, 1);
      const prevEnd = new Date(end.getFullYear(), end.getMonth() - 12 + 1, 0);
      previousPeriodRecords = baseRecords.filter(r => r.date >= prevStart && r.date <= prevEnd);
      previousLabel = `${prevStart.getFullYear()}/${prevStart.getMonth()+1}〜${prevEnd.getFullYear()}/${prevEnd.getMonth()+1}`;
    }
  } else {
    const curYear = now.getFullYear();
    const prevYear = curYear - 1;
    previousPeriodRecords = baseRecords.filter(r => r.date.getFullYear() === prevYear);
    previousLabel = `${prevYear}年`;
  }

  const yoyDiff = currentPeriodRecords.length - previousPeriodRecords.length;
  const totalShare = allRecords.length ? ((records.length / allRecords.length) * 100).toFixed(1) : '0.0';

  document.getElementById('sc-total-sub').textContent = `現在の条件で集計`;
  document.getElementById('sc-avg-sub').textContent = ratings.length ? `評価あり ${ratings.length}件ベース` : `評価データなし`;
  document.getElementById('sc-star5-sub').textContent = `全${records.length}件中 ${star5}件`;

  document.getElementById('mini-mom').textContent = formatDelta(momDiff);
  document.getElementById('mini-mom-sub').textContent = `今月 ${monthRecords.length}回 / 先月 ${prevMonthRecords.length}回`;

  document.getElementById('mini-yoy').textContent = formatDelta(yoyDiff);
  document.getElementById('mini-yoy-sub').textContent = `${previousLabel} は ${previousPeriodRecords.length}回`;

  document.getElementById('mini-share').textContent = `${totalShare}%`;
  document.getElementById('mini-share-sub').textContent = `全体 ${allRecords.length}件に対して`;
}

function adjustChartWidth(records) {
  const isWide = currentPeriod === 'all' && records.length > 24;
  document.getElementById('bar-chart-inner').className = isWide ? 'chart-inner-wide' : 'chart-inner-normal';
  document.getElementById('line-chart-inner').className = isWide ? 'chart-inner-wide' : 'chart-inner-normal';
  document.getElementById('bar-chart-scroll').scrollLeft = 0;
  document.getElementById('line-chart-scroll').scrollLeft = 0;
}

function renderCharts(records) {
  adjustChartWidth(records);

  const months = getMonthRange(records);
  const stats = buildMonthlyStats(records, months);
  const labels = stats.map(s => s.label);
  const avgRatings = stats.map(s => s.avgRating);
  const maxTick = labels.length > 36 ? Math.ceil(labels.length / 24) : labels.length > 18 ? 2 : 1;

  if (barChart) barChart.destroy();
  const barCtx = document.getElementById('bar-chart').getContext('2d');
  barChart = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'ワンマン', data: stats.map(s => s.formats['ワンマン']), backgroundColor: 'rgba(37,99,235,0.78)', stack: 'live' },
        { label: '対バン', data: stats.map(s => s.formats['対バン']), backgroundColor: 'rgba(124,58,237,0.78)', stack: 'live' },
        { label: 'フェス', data: stats.map(s => s.formats['フェス']), backgroundColor: 'rgba(217,119,6,0.78)', stack: 'live' },
        { label: 'サーキット', data: stats.map(s => s.formats['サーキット']), backgroundColor: 'rgba(5,150,105,0.78)', stack: 'live' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, usePointStyle: true } },
        tooltip: {
          callbacks: {
            title: items => `${items[0].label}`,
            label: item => `${item.dataset.label}：${item.raw}回`,
            footer: items => {
              const idx = items[0]?.dataIndex ?? 0;
              const stat = stats[idx];
              return [`合計：${stat.count}回`, `平均評価：${stat.avgRating ?? '—'}`, `星5ライブ：${stat.star5Count}回`];
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            color: '#94a3b8',
            maxRotation: 45,
            callback: (val, i) => i % maxTick === 0 ? labels[i] : ''
          }
        },
        y: {
          stacked: true,
          grid: { color: '#f1f5f9' },
          ticks: { font: { size: 10 }, color: '#94a3b8', stepSize: 1 },
          beginAtZero: true
        }
      }
    }
  });

  if (lineChart) lineChart.destroy();
  const lineCtx = document.getElementById('line-chart').getContext('2d');
  lineChart = new Chart(lineCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '平均評価',
        data: avgRatings,
        borderColor: '#059669',
        backgroundColor: 'rgba(5,150,105,0.08)',
        pointBackgroundColor: '#059669',
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: true,
        tension: 0.3,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `${items[0].label}`,
            label: item => {
              const stat = stats[item.dataIndex];
              return [`ライブ本数：${stat.count}回`, `平均評価：${item.raw ?? '—'}`, `星5ライブ：${stat.star5Count}回`];
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            color: '#94a3b8',
            maxRotation: 45,
            callback: (val, i) => i % maxTick === 0 ? labels[i] : ''
          }
        },
        y: {
          grid: { color: '#f1f5f9' },
          min: 1,
          max: 5,
          ticks: { font: { size: 10 }, color: '#94a3b8', stepSize: 1 }
        }
      }
    }
  });
}

function renderRankingList(containerId, items, colorClass = '') {
  const el = document.getElementById(containerId);
  if (!items.length) {
    el.innerHTML = '<div class="empty-msg">データなし</div>';
    return;
  }
  const maxVal = items[0].value;
  el.innerHTML = items.slice(0, 20).map((item, i) => {
    const numCls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const barW = maxVal > 0 ? (item.value / maxVal * 100).toFixed(1) : 0;
    const display = item.display !== undefined ? item.display : `${item.value}`;
    const subDisplay = item.subDisplay ? `<span class="ranking-sub">${item.subDisplay}</span>` : '';
    return `<div class="ranking-item">
      <div class="ranking-num ${numCls}">${i+1}</div>
      <div class="ranking-bar-wrap">
        <div class="ranking-name" title="${escapeHtmlAttr(item.name)}">${escapeHtml(item.name)}</div>
        <div class="ranking-bar-bg"><div class="ranking-bar-fill ${colorClass}" style="width:${barW}%"></div></div>
      </div>
      <div class="ranking-value">${display}${subDisplay}</div>
    </div>`;
  }).join('');
}

function renderLeftPanel(records) {
  if (currentArtist === 'all') {
    document.getElementById('left-panel-title').textContent = 'アーティスト別回数';
    const map = {};
    records.forEach(r => {
      r.artists.forEach(a => { map[a] = (map[a] || 0) + 1; });
    });
    const total = Object.values(map).reduce((sum, val) => sum + val, 0);
    const items = Object.entries(map).map(([name, value]) => ({
      name,
      value,
      display: `${value}回`,
      subDisplay: total ? `${((value / total) * 100).toFixed(1)}%` : ''
    })).sort((a, b) => b.value - a.value);
    renderRankingList('left-panel-list', items, '');
  } else {
    document.getElementById('left-panel-title').textContent = `${currentArtist} の年別回数`;
    const map = {};
    records.forEach(r => {
      const y = String(r.date.getFullYear());
      map[y] = (map[y] || 0) + 1;
    });
    const items = Object.entries(map).map(([name, value]) => ({
      name: `${name}年`,
      value,
      display: `${value}回`
    })).sort((a, b) => Number(b.name.slice(0,4)) - Number(a.name.slice(0,4)));
    renderRankingList('left-panel-list', items, '');
  }
}

function renderArtistRatingRanking(records) {
  const wanman = records.filter(r => r.format === 'ワンマン');
  const map = {};
  wanman.forEach(r => {
    r.artists.forEach(a => {
      if (!map[a]) map[a] = { total: 0, count: 0 };
      map[a].total += r.rating;
      map[a].count++;
    });
  });
  const items = Object.entries(map)
    .filter(([, v]) => v.count >= 3)
    .map(([name, v]) => ({
      name,
      value: v.total / v.count,
      display: (v.total / v.count).toFixed(2),
      subDisplay: `${v.count}回`
    }))
    .sort((a, b) => b.value - a.value);
  renderRankingList('artist-rating-ranking', items, 'green');
}

function renderVenueRanking(records) {
  const map = {};
  records.forEach(r => {
    if (r.venue) map[r.venue] = (map[r.venue] || 0) + 1;
  });
  const total = Object.values(map).reduce((sum, val) => sum + val, 0);
  const items = Object.entries(map).map(([name, value]) => ({
    name,
    value,
    display: `${value}回`,
    subDisplay: total ? `${((value / total) * 100).toFixed(1)}%` : ''
  })).sort((a, b) => b.value - a.value);
  renderRankingList('venue-ranking', items, 'purple');
}

function renderStar5List(records) {
  const star5 = records.filter(r => r.rating === 5).sort((a, b) => b.date - a.date);
  const el = document.getElementById('star5-list');
  if (!star5.length) {
    el.innerHTML = '<div class="empty-msg">星5のライブはありません</div>';
    return;
  }
  el.innerHTML = star5.map(r => {
    const d = r.date;
    const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    const artistDisplay = r.artists.join('・');
    const linkHtml = r.setlistUrl ? `<a class="star5-link" href="${escapeHtmlAttr(r.setlistUrl)}" target="_blank" rel="noopener noreferrer">セットリストを見る ↗</a>` : '';
    return `<div class="star5-card">
      <div class="star5-date">${dateStr}</div>
      <div class="star5-live-name">${escapeHtml(r.liveName)}</div>
      <div class="star5-artist">${escapeHtml(artistDisplay || '—')}</div>
      <div class="star5-meta">
        <span class="meta-chip">📍 ${escapeHtml(r.venue || '—')}</span>
        <span class="meta-chip">${escapeHtml(r.format || '—')}</span>
      </div>
      ${linkHtml}
    </div>`;
  }).join('');
}

function renderDashboard() {
  const records = getFilteredRecords();
  renderHeader(records);
  renderQualityInline();
  renderSummary(records);
  renderCharts(records);
  renderLeftPanel(records);
  renderArtistRatingRanking(records);
  renderVenueRanking(records);
  renderStar5List(records);
}

function showDashboard() {
  document.getElementById('no-data-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openDrawer() {
  document.getElementById('filter-drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  document.getElementById('filter-drawer').setAttribute('aria-hidden', 'false');
  renderArtistOptions(document.getElementById('artist-search-input').value || '');
}

function closeDrawer() {
  document.getElementById('filter-drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  document.getElementById('filter-drawer').setAttribute('aria-hidden', 'true');
  document.getElementById('artist-options').classList.remove('open');
}

function renderArtistOptions(keyword) {
  const container = document.getElementById('artist-options');
  const q = keyword.trim().toLowerCase();
  const filtered = ['all', ...allArtists.filter(a => a.toLowerCase().includes(q))];

  container.innerHTML = filtered.map((name, idx) => {
    const display = name === 'all' ? '全アーティスト' : name;
    const active = (name === currentArtist) ? ' active' : '';
    return `<div class="artist-option${active}" data-value="${escapeHtmlAttr(name)}">${escapeHtml(display)}</div>`;
  }).join('');

  container.classList.add('open');
}

function selectArtist(name) {
  currentArtist = name;
  document.getElementById('artist-search-input').value = name === 'all' ? '' : name;
  updateArtistCurrentLabel();
  document.getElementById('artist-options').classList.remove('open');
  renderDashboard();
}

function updateArtistCurrentLabel() {
  document.getElementById('artist-current-label').textContent = `現在：${currentArtist === 'all' ? '全アーティスト' : currentArtist}`;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escapeHtmlAttr(s) {
  return escapeHtml(s).replace(/'/g, '&#39;');
}

document.getElementById('fab-filter').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);

document.getElementById('artist-search-input').addEventListener('focus', (e) => {
  renderArtistOptions(e.target.value || '');
});

document.getElementById('artist-search-input').addEventListener('input', (e) => {
  renderArtistOptions(e.target.value || '');
});

document.getElementById('artist-options').addEventListener('click', (e) => {
  const option = e.target.closest('.artist-option');
  if (!option) return;
  selectArtist(option.dataset.value);
});

document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.search-combobox');
  if (!wrap.contains(e.target)) {
    document.getElementById('artist-options').classList.remove('open');
  }
});

document.getElementById('period-filter').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#period-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPeriod = btn.dataset.value;
  renderDashboard();
});

document.getElementById('format-filter').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#format-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFormat = btn.dataset.value;
  renderDashboard();
});

document.getElementById('rating-filter').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#rating-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRating = btn.dataset.value;
  renderDashboard();
});

(function init() {
  loadFromApi();
})();
</script>
</body>
</html>
