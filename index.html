<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE LOG Dashboard v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap');

  :root {
    --bg: #f4f7fb;
    --surface: #ffffff;
    --surface-soft: #f8fbff;
    --line: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --muted-2: #9ca3af;
    --blue: #2563eb;
    --blue-600: #1d4ed8;
    --blue-soft: #eaf1ff;
    --green: #059669;
    --amber: #d97706;
    --red: #dc2626;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; min-height: 100%; }

  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: #eef3fb;
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }

  .hidden { display: none !important; }

  .app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    background: #f6f8fc;
  }

  .sidebar {
    border-right: 1px solid #dfe7f5;
    padding: 18px 14px;
    position: sticky;
    top: 0;
    height: 100vh;
    background: transparent;
    z-index: 30;
  }

  .sidebar-head { margin-bottom: 10px; }

  .sidebar-title {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    letter-spacing: .06em;
    font-weight: 700;
    color: #0f172a;
  }

  .sidebar-subtitle {
    margin-top: 2px;
    font-size: 10px;
    color: var(--muted-2);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .sidebar-profile { display: none; }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 10px;
  }

  .sidebar-link {
    border: none;
    background: transparent;
    color: #4b5563;
    border-radius: 8px;
    text-align: left;
    padding: 6px 8px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: color .15s ease, background .15s ease;
  }

  .sidebar-link:hover { color: var(--blue-600); }

  .sidebar-link.active {
    color: var(--blue-600);
    background: #dbeafe;
    font-weight: 600;
  }

  .sidebar-foot {
    margin-top: 10px;
    border-top: 1px solid var(--line);
    padding-top: 8px;
  }

  .sidebar-foot-label {
    font-size: 10px;
    color: var(--muted-2);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .sidebar-foot-value { margin-top: 3px; font-size: 11px; color: var(--muted); }

  .content-area { min-width: 0; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #ffffff;
    border-bottom: 1px solid #e3e9f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .sidebar-toggle {
    display: none;
    border: 1px solid var(--line);
    background: #fff;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
  }

  .topbar-brand {
    font-family: 'Outfit', sans-serif;
    color: var(--blue-600);
    font-size: 15px;
    letter-spacing: .06em;
    font-weight: 700;
  }

  .topbar-caption { font-size: 10px; color: var(--muted-2); }

  .period-controls { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

  .period-btn {
    border: 1px solid #dbe3ef;
    background: #fff;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    color: #475569;
    cursor: pointer;
  }

  .period-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  .year-select {
    border: 1px solid #dbe3ef;
    border-radius: 8px;
    font-size: 11px;
    background: #fff;
    color: #475569;
    padding: 4px 8px;
  }

  .main {
    max-width: 1460px;
    margin: 0 auto;
    padding: 20px 20px 28px;
  }

  .no-data-screen {
    border: 1px dashed #cdd6e3;
    border-radius: 14px;
    text-align: center;
    padding: 38px 12px;
    background: var(--surface);
  }

  .no-data-icon { font-size: 28px; margin-bottom: 8px; }
  .no-data-title { font-size: 16px; font-weight: 700; }
  .no-data-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .header-title {
    font-family: 'Outfit', sans-serif;
    font-size: 26px;
    letter-spacing: .05em;
    font-weight: 700;
  }

  .header-title span { color: var(--blue); }

  .header-subtitle {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  .header-badge {
    background: var(--blue-soft);
    color: var(--blue-600);
    border-radius: 999px;
    padding: 2px 8px;
    font-weight: 600;
    font-size: 11px;
  }

  .condition-bar,
  .quality-inline {
    background: #ffffff;
    border: 1px solid #dbe4f4;
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 6px 8px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .quality-inline.warn { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
  .quality-inline.good { color: var(--green); }

  .hero-panel {
    background: linear-gradient(135deg, #f3f6ff, #eef9ff);
    border: 1px solid #dde7fb;
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .dashboard-hero {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    align-items: stretch;
  }

  .summary-grid { display: contents; }

  .card,
  .chart-card,
  .mini-card,
  .star5-card,
  .recent-note-card,
  .list-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .card,
  .chart-card { padding: 10px; }

  .summary-grid .card {
    height: 168px;
    min-height: 168px;
    padding: 16px;
    border-radius: 18px;
    border: 1px solid #dde6f5;
    box-shadow: 0 10px 24px rgba(31, 72, 142, 0.08);
    background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
    transition: transform .16s ease, box-shadow .16s ease;
  }

  .summary-grid .card:hover,
  .chart-card:hover,
  .mini-card:hover,
  .recent-note-card:hover,
  .list-card:hover,
  .star5-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12); }

  .kpi-main {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 2px;
  }

  .summary-card-icon {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 11px;
  }

  .icon-blue { background: #dbeafe; }
  .icon-green { background: #dcfce7; }
  .icon-amber { background: #ffedd5; }

  .summary-card-value {
    font-family: 'Outfit', sans-serif;
    font-size: 46px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -.01em;
  }

  .summary-card-value span {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 4px;
  }

  .summary-card-label { font-size: 24px; color: var(--text); font-weight: 700; line-height: 1.25; }

  .summary-card-sub {
    border-top: 1px solid var(--line);
    padding-top: 6px;
    font-size: 14px;
    color: #3b82f6;
    font-weight: 700;
  }

  .recent-notes-panel {
    height: 132px;
    min-height: 132px;
    padding: 10px;
    border-radius: 18px;
    border: 1px solid #dde6f5;
    box-shadow: 0 10px 24px rgba(31, 72, 142, 0.08);
    background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }

  .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    width: 3px;
    height: 14px;
    border-radius: 4px;
    background: linear-gradient(180deg, #60a5fa, #2563eb);
  }

  .section-note { font-size: 10px; color: var(--muted-2); }

  .recent-note-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 6px;
  }

  .recent-notes-panel .recent-note-list {
    grid-template-columns: 1fr;
    gap: 4px;
    margin-top: 0;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 2px;
  }


  .note-summary-row {
    display: grid;
    grid-template-columns: minmax(0, 1.8fr) minmax(320px, 1fr);
    gap: 12px;
    align-items: start;
    margin-bottom: 16px;
  }

  #recent-notes-section { margin-bottom: 0 !important; }
  .compact-summary .section-title { margin-bottom: 8px; }
  .compact-summary .mini-card { padding: 10px; }
  .compact-summary .mini-value { font-size: 36px; }
  .compact-summary .mini-label { font-size: 12px; }

.summary-subgrid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 0;
  }

  .mini-card { padding: 8px 10px; }
  .mini-label { font-size: 10px; color: var(--muted); }
  .mini-value { margin-top: 3px; font-size: 20px; font-weight: 700; font-family: 'Outfit', sans-serif; }
  .mini-sub { margin-top: 3px; font-size: 10px; color: var(--muted-2); }

  .charts-row {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .chart-scroll { overflow-x: auto; overflow-y: hidden; padding-bottom: 2px; }
  .chart-scroll::-webkit-scrollbar { height: 6px; }
  .chart-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-inner-normal { width: 100%; min-width: 0; }
  .chart-inner-wide { width: 100%; min-width: 0; }

  .analysis-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }

  .scroll-list { max-height: 320px; overflow: auto; padding-right: 2px; }
  .scroll-list::-webkit-scrollbar { width: 6px; }
  .scroll-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }  .ranking-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }

  .ranking-item:last-child { border-bottom: none; }
  .ranking-num { width: 20px; text-align: center; font-size: 12px; color: var(--muted-2); font-weight: 700; }
  .ranking-num.top1 { color: #b45309; }
  .ranking-num.top2 { color: #6b7280; }
  .ranking-num.top3 { color: #92400e; }
  .ranking-bar-wrap { flex: 1; min-width: 0; }
  .ranking-name { font-size: 12px; margin-bottom: 3px; color: #1f2937; }
  .ranking-bar-bg { height: 4px; border-radius: 4px; background: #e5e7eb; overflow: hidden; }
  .ranking-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #60a5fa, #2563eb); }
  .ranking-value { font-size: 11px; color: #334155; font-weight: 600; }

  .star5-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 8px;
  }

  .star5-card { padding: 10px; }
  .star5-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .star5-title { font-size: 12px; font-weight: 600; color: #111827; }
  .star5-date { font-size: 10px; color: var(--muted-2); }
  .star5-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .note-type-chip {
    border: 1px solid #dbeafe;
    background: #eff6ff;
    color: var(--blue-600);
    padding: 1px 6px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
  }

  .recent-note-card { padding: 8px; }
  .recent-note-thumb { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; background: #f1f5f9; }
  .recent-note-date { font-size: 10px; color: var(--muted-2); }
  .recent-note-title { margin-top: 3px; font-size: 12px; color: #1f2937; font-weight: 600; line-height: 1.4; }
  .recent-note-meta { margin-top: 6px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }

  .recent-notes-panel .recent-note-card {
    border: none;
    border-radius: 0;
    border-bottom: 1px solid #e5e7eb;
    padding: 6px 2px;
    background: transparent;
  }

  .recent-notes-panel .recent-note-card:last-child { border-bottom: none; }


  .list-table-wrap {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    overflow: auto;
    margin-bottom: 10px;
  }

  .list-table { width: 100%; border-collapse: collapse; min-width: 860px; }
  .list-table th,
  .list-table td {
    font-size: 12px;
    padding: 8px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    white-space: nowrap;
  }

  .list-table th {
    background: #f8fafc;
    color: #475569;
    font-weight: 600;
    position: sticky;
    top: 0;
  }

  .list-cards { display: none; gap: 8px; }
  .list-card { padding: 9px; }
  .list-card-title { font-size: 12px; font-weight: 700; }
  .list-card-meta { margin-top: 5px; font-size: 11px; color: var(--muted); }

  a { color: var(--blue-600); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 600;
  }

  .chip-format { background: #f1f5f9; color: #334155; }
  .chip-rating-high { background: #dcfce7; color: #166534; }
  .chip-rating-mid { background: #fef3c7; color: #92400e; }
  .chip-rating-low { background: #fee2e2; color: #991b1b; }

  .fab-filter {
    position: fixed;
    right: 14px;
    bottom: 14px;
    border: none;
    border-radius: 999px;
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 14px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.28);
    display: none;
    z-index: 80;
  }

  .filter-drawer-backdrop,
  .sidebar-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    opacity: 0;
    visibility: hidden;
    transition: opacity .2s ease;
    z-index: 70;
  }

  .filter-drawer-backdrop.open,
  .sidebar-backdrop.open { opacity: 1; visibility: visible; }

  .filter-drawer {
    position: fixed;
    right: 0;
    top: 0;
    height: 100vh;
    width: min(360px, 92vw);
    background: #fff;
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: transform .24s ease;
    z-index: 80;
    display: flex;
    flex-direction: column;
  }

  .filter-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .drawer-title { font-size: 13px; font-weight: 700; }

  .drawer-close {
    border: 1px solid var(--line);
    border-radius: 8px;
    width: 28px;
    height: 28px;
    background: #fff;
    cursor: pointer;
  }

  .drawer-body { padding: 10px 12px; overflow: auto; }

  .filter-group { margin-bottom: 12px; }
  .filter-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }

  .filter-btn-group { display: flex; flex-wrap: wrap; gap: 6px; }

  .filter-btn {
    border: 1px solid #dbe3ef;
    background: #fff;
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 11px;
    color: #475569;
    cursor: pointer;
  }

  .filter-btn.active {
    background: #eaf1ff;
    border-color: #bfdbfe;
    color: var(--blue-600);
    font-weight: 600;
  }

  .search-combobox { position: relative; }

  .artist-search-input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 12px;
    padding: 7px 9px;
  }

  .artist-options {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 4px);
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 10px 20px rgba(15, 23, 42, 0.1);
    max-height: 220px;
    overflow: auto;
    z-index: 10;
    display: none;
  }

  .artist-options.show { display: block; }

  .artist-option {
    padding: 7px 8px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #f1f5f9;
  }

  .artist-option:last-child { border-bottom: none; }
  .artist-option:hover { background: #eff6ff; }

  .artist-current { margin-top: 6px; font-size: 11px; color: var(--muted-2); }

  .toast {
    position: fixed;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    bottom: 12px;
    background: #0f172a;
    color: #fff;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 11px;
    opacity: 0;
    pointer-events: none;
    transition: .2s ease;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 1200px) {
    .summary-subgrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .analysis-row { grid-template-columns: 1fr; }
    .charts-row { grid-template-columns: 1fr; }
  }

  @media (max-width: 960px) {
    .app-shell { grid-template-columns: 1fr; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: min(240px, 80vw);
      transform: translateX(-100%);
      transition: transform .24s ease;
      background: #fff;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.15);
      z-index: 75;
    }

    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: inline-grid; place-items: center; }
    .fab-filter { display: inline-flex; align-items: center; justify-content: center; }

    .dashboard-hero { grid-template-columns: 1fr; }
    .dashboard-hero { grid-template-columns: 1fr; }
    .summary-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .summary-grid .card,
    .recent-notes-panel { height: auto; min-height: 120px; }
  }

  @media (max-width: 640px) {
    .main { padding: 8px; }
    .topbar { padding: 8px; }
    .header-title { font-size: 23px; }
    .summary-card-value { font-size: 28px; }
    .summary-subgrid { grid-template-columns: 1fr; }
    .list-table-wrap { display: none; }
    .list-cards { display: grid; }
    .chart-inner-wide { width: 900px; min-width: 900px; }
    .recent-note-list { grid-template-columns: 1fr; }
  }

</style>
</head>
<body>
  <!-- (全文が非常に長いため、この環境の出力上限によりここで途切れる可能性があります。必要なら次メッセージで残りをそのまま続けて出します) -->
</body>
</html>
